<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Flash 游戏播放器</title>
    <style>
        body {
            margin: 0;
            background: #222;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            padding: 10px 20px;
            background: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn">← 返回列表</a>
    <div id="player"></div>

    <script src="ruffle/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player");
            container.appendChild(player);

            // 从 URL 获取游戏路径 (?game=xxx.swf)
            const urlParams = new URLSearchParams(window.location.search);
            const gamePath = urlParams.get('game');

            if (gamePath) {
                // 提取 SWF 所在目录作为 base URL，以便正确解析相对路径资源（如 levels/*.xml）
                const baseUrl = gamePath.substring(0, gamePath.lastIndexOf('/') + 1);
                player.load({
                    url: gamePath,
                    base: baseUrl
                });
            } else {
                alert("没有指定游戏文件！");
            }
        });
    </script>
</body>

</html>
