version: '3'
services:
  flash-arcade:
    image: nginx:alpine
    container_name: flash-arcade
    ports:
      - "48058:80"
    volumes:
      # 1. 挂载游戏和网页 (保持不变)
      - ./html:/usr/share/nginx/html
      - /root/data/docker_data/openlist/data/openlist/download/小游戏合集（未压缩）:/usr/share/nginx/html/games:ro
      
      # 2. 【新增】挂载密码文件 (注意路径)
      - ./html/.htpasswd:/etc/nginx/.htpasswd:ro
      
      # 3. 【新增】挂载配置文件，覆盖默认配置
      - ./html/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always